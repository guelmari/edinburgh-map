<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edinburgh Map — Webster & Lopez</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & tokens ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #F7F4E6;
      --sand:       #E3DFCF;
      --olive:      #3E4034;
      --olive-mid:  #717561;
      --off-white:  #FAF9F5;
      --near-black: #141413;
      --border:     rgba(31,30,29,0.18);
      --font-b: 'Libre Caslon Text', serif;
      --font-u: 'Inter', sans-serif;

      /* Category colours */
      --c-landmark:     #8B6E4E;
      --c-nature:       #5C7A52;
      --c-tour:         #7A5C8B;
      --c-neighbourhood:#4E7A7A;
      --c-wedding:      #B85C5C;
      --c-all:          #3E4034;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--cream);
      font-family: var(--font-u);
      color: var(--olive);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout wrapper ── */
    .map-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0;
    }

    /* ── Legend / filter pills ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 16px 12px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }

    .legend-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: var(--font-u);
      font-size: 12px;
      font-weight: 500;
      color: var(--olive-mid);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      user-select: none;
      white-space: nowrap;
    }

    .legend-pill:hover {
      background: rgba(62,64,52,0.06);
      color: var(--olive);
    }

    .legend-pill.active {
      border-color: transparent;
      color: white;
    }

    .legend-pill.active[data-cat="all"]          { background: var(--c-all); }
    .legend-pill.active[data-cat="landmark"]      { background: var(--c-landmark); }
    .legend-pill.active[data-cat="nature"]        { background: var(--c-nature); }
    .legend-pill.active[data-cat="tour"]          { background: var(--c-tour); }
    .legend-pill.active[data-cat="neighbourhood"] { background: var(--c-neighbourhood); }
    .legend-pill.active[data-cat="wedding"]       { background: var(--c-wedding); }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Map container ── */
    #map {
      flex: 1;
      min-height: 0; /* important for flex child to shrink */
    }

    /* ── Leaflet popup overrides ── */
    .leaflet-popup-content-wrapper {
      border-radius: 8px !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 4px 24px rgba(20,20,19,0.12) !important;
      padding: 0 !important;
      overflow: hidden;
      font-family: var(--font-u) !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: auto !important;
      min-width: 220px;
    }

    .leaflet-popup-tip-container { display: none; }

    .popup-inner {
      padding: 14px 16px 16px;
      background: var(--off-white);
    }

    .popup-cat {
      font-family: var(--font-u);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--olive-mid);
      margin-bottom: 4px;
    }

    .popup-name {
      font-family: var(--font-b);
      font-size: 16px;
      font-weight: 700;
      color: var(--near-black);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .popup-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--olive-mid);
      margin-bottom: 10px;
    }

    .popup-link {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      color: var(--olive);
      text-decoration: none;
      border-bottom: 1px solid var(--olive);
      padding-bottom: 1px;
      transition: opacity 0.15s;
    }

    .popup-link:hover { opacity: 0.6; }

    /* Wedding pill accent on popup */
    .popup-inner.wedding .popup-cat { color: var(--c-wedding); }
    .popup-inner.landmark .popup-cat { color: var(--c-landmark); }
    .popup-inner.nature .popup-cat { color: var(--c-nature); }
    .popup-inner.tour .popup-cat { color: var(--c-tour); }
    .popup-inner.neighbourhood .popup-cat { color: var(--c-neighbourhood); }

    /* ── Tile layer attribution ── */
    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(247,244,230,0.85) !important;
    }
  </style>
</head>
<body>
  <div class="map-wrap">

    <!-- Filter legend -->
    <div class="legend" id="legend">
      <button class="legend-pill active" data-cat="all">
        <span class="legend-dot" style="background:var(--c-all);"></span>All
      </button>
      <button class="legend-pill" data-cat="wedding">
        <span class="legend-dot" style="background:var(--c-wedding);"></span>Wedding Venues
      </button>
      <button class="legend-pill" data-cat="landmark">
        <span class="legend-dot" style="background:var(--c-landmark);"></span>Landmarks
      </button>
      <button class="legend-pill" data-cat="nature">
        <span class="legend-dot" style="background:var(--c-nature);"></span>Nature &amp; Views
      </button>
      <button class="legend-pill" data-cat="tour">
        <span class="legend-dot" style="background:var(--c-tour);"></span>Tours &amp; Experiences
      </button>
      <button class="legend-pill" data-cat="neighbourhood">
        <span class="legend-dot" style="background:var(--c-neighbourhood);"></span>Neighbourhoods
      </button>
    </div>

    <!-- Map -->
    <div id="map"></div>

  </div>

  <script>
  (function () {

    /* ── Data ── */
    const CAT_COLORS = {
      landmark:      '#8B6E4E',
      nature:        '#5C7A52',
      tour:          '#7A5C8B',
      neighbourhood: '#4E7A7A',
      wedding:       '#B85C5C'
    };

    const CAT_LABELS = {
      landmark:      'Landmark',
      nature:        'Nature & Views',
      tour:          'Tour & Experience',
      neighbourhood: 'Neighbourhood',
      wedding:       'Wedding Venue'
    };

    const PLACES = [
      // Wedding venues
      { name: 'City Chambers', cat: 'wedding', lat: 55.9496, lng: -3.1888,
        desc: 'Ceremony venue. The Royal Mile, EH1 1YJ. Arrive by 2:45pm.',
        link: 'https://maps.google.com/?q=City+Chambers+Edinburgh' },
      { name: "Surgeon's Quarter", cat: 'wedding', lat: 55.9440, lng: -3.1852,
        desc: 'Reception venue. Nicolson St, EH8 9DW.',
        link: 'https://maps.google.com/?q=Surgeons+Quarter+Edinburgh' },

      // Landmarks
      { name: 'Edinburgh Castle', cat: 'landmark', lat: 55.9486, lng: -3.1999,
        desc: 'A must-visit. Book tickets in advance.',
        link: 'https://www.edinburghcastle.scot' },
      { name: "Mary King's Close", cat: 'landmark', lat: 55.9497, lng: -3.1909,
        desc: 'Underground old city — fascinating interactive tour.',
        link: 'https://www.realmarykingsclose.com/' },
      { name: 'The Royal Mile', cat: 'landmark', lat: 55.9494, lng: -3.1860,
        desc: 'Castle to Holyrood — architecture, history & shopping.',
        link: 'https://maps.google.com/?q=Royal+Mile+Edinburgh' },
      { name: 'Victoria Street & Grassmarket', cat: 'landmark', lat: 55.9471, lng: -3.1935,
        desc: "Inspiration for Diagon Alley. Bars, shops & Mary's Milk Bar.",
        link: 'https://maps.google.com/?q=Victoria+Street+Edinburgh' },
      { name: 'National Museum of Scotland', cat: 'landmark', lat: 55.9467, lng: -3.1899,
        desc: 'Free entry. Stunning building, excellent collections.',
        link: 'https://www.nms.ac.uk/national-museum-of-scotland/' },
      { name: 'Palace of Holyroodhouse', cat: 'landmark', lat: 55.9524, lng: -3.1720,
        desc: "King Charles' official Scottish residence.",
        link: 'https://www.rct.uk/visit/palace-of-holyroodhouse/' },
      { name: 'Scotch Whisky Experience', cat: 'landmark', lat: 55.9489, lng: -3.1997,
        desc: 'Whisky history and tastings, top of the Royal Mile.',
        link: 'https://www.scotchwhiskyexperience.co.uk/' },
      { name: 'Scottish Parliament', cat: 'landmark', lat: 55.9524, lng: -3.1749,
        desc: 'Striking modern building at the foot of the Royal Mile.',
        link: 'https://www.parliament.scot/visit' },

      // Nature & Views
      { name: 'Calton Hill', cat: 'nature', lat: 55.9554, lng: -3.1822,
        desc: 'Best panoramic view of the city. Easy 10-min walk up.',
        link: 'https://maps.google.com/?q=Calton+Hill+Edinburgh' },
      { name: "Arthur's Seat", cat: 'nature', lat: 55.9444, lng: -3.1617,
        desc: 'Extinct volcano, brilliant hike with incredible views.',
        link: 'https://www.historicenvironment.scot/visit-a-place/places/holyrood-park/' },
      { name: 'Princes Street Gardens', cat: 'nature', lat: 55.9514, lng: -3.2007,
        desc: 'Beautiful park between Old and New Towns.',
        link: 'https://maps.google.com/?q=Princes+Street+Gardens+Edinburgh' },
      { name: 'Dean Village', cat: 'nature', lat: 55.9531, lng: -3.2156,
        desc: 'Quaint village by the Water of Leith, west of centre.',
        link: 'https://maps.google.com/?q=Dean+Village+Edinburgh' },
      { name: 'Portobello Beach', cat: 'nature', lat: 55.9530, lng: -3.1130,
        desc: "Edinburgh's seaside! A short bus or taxi ride.",
        link: 'https://maps.google.com/?q=Portobello+Beach+Edinburgh' },

      // Tours & Experiences
      { name: 'Johnnie Walker Experience', cat: 'tour', lat: 55.9521, lng: -3.1992,
        desc: 'Interactive whisky experience on Princes Street.',
        link: 'https://www.johnniewalker.com/en-gb/our-story/johnnie-walker-princes-street/' },
      { name: "Pickering's Gin", cat: 'tour', lat: 55.9437, lng: -3.1823,
        desc: 'Gin distillery tour at Summerhall Arts Space.',
        link: 'https://www.pickeringsgin.com/' },
      { name: 'Camera Obscura', cat: 'tour', lat: 55.9492, lng: -3.1980,
        desc: 'Fun optical illusion attraction near the Castle.',
        link: 'https://www.camera-obscura.co.uk/' },

      // Neighbourhoods
      { name: 'Stockbridge', cat: 'neighbourhood', lat: 55.9580, lng: -3.2102,
        desc: 'Lovely neighbourhood for wandering, coffee & independent shops.',
        link: 'https://maps.google.com/?q=Stockbridge+Edinburgh' },
      { name: 'Leith', cat: 'neighbourhood', lat: 55.9756, lng: -3.1737,
        desc: 'The hip area of Edinburgh. Great food, the Shore & good vibes.',
        link: 'https://maps.google.com/?q=Leith+Edinburgh' },
      { name: 'Grassmarket', cat: 'neighbourhood', lat: 55.9469, lng: -3.1938,
        desc: 'Historic square with great bars, restaurants and shops.',
        link: 'https://maps.google.com/?q=Grassmarket+Edinburgh' },
    ];

    /* ── SVG pin icon ── */
    function makeIcon(cat) {
      const color = CAT_COLORS[cat] || '#3E4034';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
        <path d="M13 0C5.82 0 0 5.82 0 13c0 9.75 13 21 13 21s13-11.25 13-21C26 5.82 20.18 0 13 0z"
          fill="${color}" stroke="white" stroke-width="2"/>
        <circle cx="13" cy="13" r="5" fill="white" opacity="0.9"/>
      </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize: [26, 34],
        iconAnchor: [13, 34],
        popupAnchor: [0, -38]
      });
    }

    /* ── Initialise map ── */
    const map = L.map('map', {
      center: [55.9506, -3.1860],
      zoom: 14,
      zoomControl: true,
      scrollWheelZoom: false,
      tap: true
    });

    L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/watercolor/{z}/{x}/{y}.jpg', {
      attribution: 'Map tiles by <a href="http://stamen.com">Stamen Design</a>, under <a href="http://creativecommons.org/licenses/by/3.0">CC BY 3.0</a>. Data by <a href="http://openstreetmap.org">OpenStreetMap</a>, under <a href="http://creativecommons.org/licenses/by-sa/3.0">CC BY SA</a>.',
      subdomains: 'abcd',
      maxZoom: 18
    }).addTo(map);

    /* ── Add markers ── */
    const allMarkers = [];
    const markersByCat = {};

    PLACES.forEach(function (p) {
      const marker = L.marker([p.lat, p.lng], { icon: makeIcon(p.cat) });

      const linkHtml = p.link
        ? `<a href="${p.link}" target="_blank" rel="noopener" class="popup-link">Visit website →</a>`
        : '';

      marker.bindPopup(`
        <div class="popup-inner ${p.cat}">
          <div class="popup-cat">${CAT_LABELS[p.cat] || p.cat}</div>
          <div class="popup-name">${p.name}</div>
          <div class="popup-desc">${p.desc}</div>
          ${linkHtml}
        </div>
      `, { maxWidth: 280, minWidth: 220 });

      marker.addTo(map);
      allMarkers.push({ marker, cat: p.cat });
      if (!markersByCat[p.cat]) markersByCat[p.cat] = [];
      markersByCat[p.cat].push(marker);
    });

    /* ── Legend filtering ── */
    document.querySelectorAll('.legend-pill').forEach(function (pill) {
      pill.addEventListener('click', function () {
        document.querySelectorAll('.legend-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');

        const cat = pill.dataset.cat;
        allMarkers.forEach(function (m) {
          if (cat === 'all' || m.cat === cat) {
            m.marker.addTo(map);
          } else {
            m.marker.remove();
          }
        });
      });
    });

    /* ── Invalidate size after fonts/layout settle ── */
    setTimeout(() => map.invalidateSize(), 100);

  })();
  </script>
</body>
</html>
